<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2L Portal</title>
    <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
    <style>
        :root { --primary-purple: #4B53BC; --secondary-purple: #353B8E; --bg-color: #F3F5F9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; width: 500px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; text-align: center; }
        .header { background: linear-gradient(135deg, var(--primary-purple) 0%, var(--secondary-purple) 100%); color: white; padding: 40px 20px; }
        .header h1 { margin: 0; font-size: 24px; }
        .login-pill { background: rgba(255, 255, 255, 0.15); border-radius: 50px; padding: 6px 16px; display: inline-flex; align-items: center; margin-top: 20px; font-size: 12px; }
        .dot { height: 8px; width: 8px; background: #4ADE80; border-radius: 50%; margin-right: 8px; }
        .body-content { padding: 40px 30px; }
        .btn-main { background: var(--primary-purple); color: white; border: none; padding: 14px 45px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { transform: translateY(-2px); background: var(--secondary-purple); }
        .mood-grid { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .mood-btn { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 10px; width: 45px; height: 45px; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .mood-btn.active { border-color: var(--primary-purple); background: #EEF2FF; transform: scale(1.1); }
        .footer-message { font-size: 14px; color: var(--primary-purple); font-weight: 600; min-height: 20px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1 id="user-greeting">...</h1>
            <p id="sub-header">...</p>
            <div class="login-pill">
                <span class="dot"></span>
                <span id="login-label"></span> <span id="current-time"></span>
            </div>
        </div>
        <div class="body-content">
            <h3 id="course-header">...</h3>
            <p id="course-desc" style="color: #6B7280; font-size: 14px;">...</p>
            <button class="btn-main" id="main-button" onclick="window.open('https://prooffice.plan2learn.dk/?id=1ef2679d-ff86-4c0f-abab-ee2e0ce35655', '_blank')">
                ...
            </button>
            <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
                <span id="mood-header" style="font-size:12px; color:#9CA3AF;">...</span>
                <div class="mood-grid">
                    <button class="mood-btn" onclick="setMood(this, 'rocket')">🚀</button>
                    <button class="mood-btn" onclick="setMood(this, 'happy')">😊</button>
                    <button class="mood-btn" onclick="setMood(this, 'neutral')">😐</button>
                    <button class="mood-btn active" onclick="setMood(this, 'sleepy')">😴</button>
                </div>
                <div id="status-text" class="footer-message">...</div>
            </div>
        </div>
    </div>

    <script>
        let currentMoodMessages = {};

        async function initializeApp() {
            try {
                await microsoftTeams.app.initialize();
                
                setTimeout(async () => {
                    const context = await microsoftTeams.app.getContext();
                    
                    // --- 1. LANGUAGE DETECTION ---
                    const locale = context.app.locale || "en-us";
                    const isDanish = locale.toLowerCase().includes("da");

                    // --- 2. FIRST NAME LOGIC ---
                    const fullName = context.user.displayName || context.user.givenName || "User";
                    const firstName = fullName.split(' ')[0]; 

                    // --- 3. TRANSLATIONS ---
                    const translations = {
                        greeting: isDanish ? "Godt at se dig, " : "Good to see you, ",
                        subtext: isDanish ? "Klar til at blive klogere i dag?" : "Ready to level up today?",
                        login: isDanish ? "Sidste login: " : "Last login: ",
                        courseHeader: isDanish ? "Dine kurser venter på dig" : "Your courses are waiting for you",
                        courseDesc: isDanish ? "Fortsæt hvor du slap — ét klik og du er i gang igen." : "Pick up where you left off — one click and you're back in the zone.",
                        button: isDanish ? "Gå til Plan2Learn" : "Jump into Plan2Learn",
                        moodHeading: isDanish ? "Hvordan har du det i dag?" : "How are you feeling today?"
                    };

                    currentMoodMessages = {
                        rocket: isDanish ? "Fuld fart frem! Lad os knuse de kurser! 🚀" : "Full speed ahead! Let's crush those courses! 🚀",
                        happy: isDanish ? "Gode vibrationer! Perfekt dag til læring. 😊" : "Great vibes! Perfect day for some learning. 😊",
                        neutral: isDanish ? "Lad os gøre 'meh' til mesterligt i dag. 😐" : "Let's turn that 'meh' into 'mastery' today. 😐",
                        sleepy: isDanish ? "Kaffe først, så Plan2Learn 😂" : "Coffee first, then Plan2Learn 😂"
                    };

                    // --- 4. UPDATE UI ---
                    document.getElementById('user-greeting').innerText = translations.greeting + firstName + "!";
                    document.getElementById('sub-header').innerText = translations.subtext;
                    document.getElementById('login-label').innerText = translations.login;
                    document.getElementById('course-header').innerText = translations.courseHeader;
                    document.getElementById('course-desc').innerText = translations.courseDesc;
                    document.getElementById('main-button').innerText = translations.button;
                    document.getElementById('mood-header').innerText = translations.moodHeading;
                    document.getElementById('status-text').innerText = currentMoodMessages.sleepy;

                    // Set dynamic time based on language
                    const now = new Date();
                    document.getElementById('current-time').innerText = now.toLocaleDateString(isDanish ? 'da-DK' : 'en-GB', { 
                        weekday: 'long', day: 'numeric', month: 'long' 
                    }) + ' kl. ' + now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();

                }, 150);
            } catch (err) {
                console.error("Teams SDK error:", err);
            }
        }

        function setMood(btn, moodKey) {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('status-text').innerText = currentMoodMessages[moodKey];
        }

        if (window.parent !== window.self) {
            initializeApp();
        }
    </script>
</body>
</html>
